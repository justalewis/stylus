# LiCS front-matter schema.
# Lists required and optional metadata fields for an article.
# Used by the editor to surface missing-field warnings.

required:
  - title
  - author          # list of {name, affiliation}
  - abstract

optional:
  - subtitle
  - short-title     # for running headers (recto)
  - short-authors   # for running headers (verso)
  - keywords        # list of strings
  - doi
  - submitted-date
  - accepted-date
  - published-date
  - journal         # inherited from issue
  - volume          # inherited from issue
  - issue           # inherited from issue
  - year            # inherited from issue
  - start-page      # computed by issue assembly
  - end-page        # computed by issue assembly
  - copyright       # default applied by template if absent
