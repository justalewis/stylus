{% extends "base.html" %}
{% block title %}Edit (WYSIWYG) | {{ article['title'] }}{% endblock %}
{% block head %}
<style>
  .editor-toolbar {
    display: flex;
    gap: var(--space-2);
    align-items: center;
    padding: var(--space-3) var(--space-3);
    border-bottom: 1px solid var(--rule);
    margin: 0 calc(var(--space-3) * -1) var(--space-4);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--paper);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    box-shadow: 0 1px 0 var(--rule), 0 4px 12px -8px rgba(0,0,0,0.08);
  }
  .editor-toolbar .group {
    display: flex;
    gap: 1px;
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .editor-toolbar button.tb {
    background: var(--paper);
    color: var(--ink);
    border: 0;
    padding: var(--space-2) var(--space-3);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    cursor: pointer;
    border-radius: 0;
    min-width: 2.5rem;
  }
  .editor-toolbar button.tb:hover { background: var(--surface-sage-soft); color: var(--accent); }
  .editor-toolbar button.tb.active {
    background: var(--accent);
    color: var(--paper);
  }
  .save-status { margin-left: auto; color: var(--muted); font-size: var(--text-sm); }

  .ProseMirror {
    min-height: 60vh;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: var(--space-6) var(--space-8);
    font-family: var(--font-display);
    font-size: var(--text-lg);
    line-height: var(--leading-base);
    color: var(--ink);
    outline: none;
  }
  .ProseMirror:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(44, 74, 58, 0.12); }
  .ProseMirror h1, .ProseMirror h2 {
    font-family: var(--font-display);
    font-weight: 500;
    line-height: var(--leading-tight);
    margin: var(--space-5) 0 var(--space-3);
    color: var(--accent);
  }
  .ProseMirror h1 { font-size: var(--text-2xl); }
  .ProseMirror h2 { font-size: var(--text-xl); }
  .ProseMirror h3 {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: var(--text-lg);
    margin: var(--space-4) 0 var(--space-2);
  }
  .ProseMirror p { margin: 0 0 var(--space-4); }
  .ProseMirror blockquote {
    border-left: 3px solid var(--rule-strong);
    padding-left: var(--space-4);
    margin: var(--space-4) 0;
    color: var(--muted);
    font-style: italic;
  }
  .ProseMirror ul, .ProseMirror ol { padding-left: var(--space-6); }
  .ProseMirror a { color: var(--accent); }
  .ProseMirror code {
    font-family: var(--font-mono);
    background: var(--surface-taupe-soft);
    padding: 0.05em 0.4em;
    border-radius: var(--radius-sm);
    font-size: 0.92em;
  }
</style>
{% endblock %}
{% block content %}
<section class="card">
  <h1>Edit: {{ article['title'] }}</h1>
  <p class="dim">
    WYSIWYG editor; serializes back to Markdown on save.
    &middot; <a href="{{ url_for('article_home', article_id=article['id']) }}">Back</a>
    &middot; <a href="{{ url_for('article_edit', article_id=article['id']) }}">Edit as Markdown</a>
  </p>

  <div class="editor-toolbar">
    <div class="group">
      <button type="button" class="tb" data-cmd="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
      <button type="button" class="tb" data-cmd="italic" title="Italic (Ctrl+I)"><em>I</em></button>
      <button type="button" class="tb" data-cmd="code" title="Inline code">&lt;/&gt;</button>
      <button type="button" class="tb" data-cmd="link" title="Link">link</button>
    </div>
    <div class="group">
      <button type="button" class="tb" data-cmd="h1" title="Heading 1">H1</button>
      <button type="button" class="tb" data-cmd="h2" title="Heading 2">H2</button>
      <button type="button" class="tb" data-cmd="h3" title="Heading 3">H3</button>
      <button type="button" class="tb" data-cmd="p" title="Paragraph">¶</button>
    </div>
    <div class="group">
      <button type="button" class="tb" data-cmd="ul" title="Bulleted list">• list</button>
      <button type="button" class="tb" data-cmd="ol" title="Numbered list">1. list</button>
      <button type="button" class="tb" data-cmd="quote" title="Blockquote">"</button>
    </div>
    <div class="group">
      <button type="button" class="tb" data-cmd="image" title="Insert image (uploads to article assets/)">img</button>
    </div>
    <div class="group">
      <button type="button" class="tb" data-cmd="undo" title="Undo (Ctrl+Z)">undo</button>
      <button type="button" class="tb" data-cmd="redo" title="Redo (Ctrl+Y)">redo</button>
    </div>
    <input type="file" id="image-upload-input" accept="image/*" hidden />
    <span class="dim image-upload-status" id="image-upload-status" style="display:none;"></span>
    <button type="button" class="button" id="save-btn" style="margin-left: auto;">Save</button>
    <span class="save-status" id="save-status"></span>
  </div>

  <div id="editor-host"></div>
  <textarea id="initial-body" hidden>{{ body }}</textarea>
  <script id="asset-upload-config" type="application/json">{{ {'upload_url': url_for('article_upload_asset', article_id=article['id'])} | tojson }}</script>
</section>

<script type="module">
  import { schema, defaultMarkdownParser, defaultMarkdownSerializer } from "https://esm.sh/prosemirror-markdown@1.13.1";
  import { EditorState } from "https://esm.sh/prosemirror-state@1.4.3";
  import { EditorView } from "https://esm.sh/prosemirror-view@1.34.3";
  import { keymap } from "https://esm.sh/prosemirror-keymap@1.2.2";
  import { baseKeymap, toggleMark, setBlockType, wrapIn, chainCommands } from "https://esm.sh/prosemirror-commands@1.6.0";
  import { history, undo, redo } from "https://esm.sh/prosemirror-history@1.4.1";
  import { wrapInList, splitListItem, liftListItem, sinkListItem } from "https://esm.sh/prosemirror-schema-list@1.3.0";
  import { dropCursor } from "https://esm.sh/prosemirror-dropcursor@1.8.1";
  import { gapCursor } from "https://esm.sh/prosemirror-gapcursor@1.3.2";

  const initialMd = document.getElementById('initial-body').value;
  const doc = defaultMarkdownParser.parse(initialMd);

  const cmdBold   = toggleMark(schema.marks.strong);
  const cmdItalic = toggleMark(schema.marks.em);
  const cmdCode   = toggleMark(schema.marks.code);

  function setLink(state, dispatch) {
    const url = window.prompt("Link URL:");
    if (!url) return false;
    const mark = schema.marks.link.create({ href: url });
    const { from, to, empty } = state.selection;
    if (empty) return false;
    if (dispatch) dispatch(state.tr.addMark(from, to, mark));
    return true;
  }

  // Image insertion: click the toolbar button → file picker → POST the
  // file to /upload-asset → insert a ProseMirror image node pointing at
  // the returned relative path. The upload URL is rendered into the page
  // via Flask's url_for so this template doesn't have to guess.
  const uploadUrl = JSON.parse(document.getElementById('asset-upload-config').textContent).upload_url;
  const imageInput = document.getElementById('image-upload-input');
  const imageStatus = document.getElementById('image-upload-status');

  async function insertImage(state, dispatch) {
    // Trigger the hidden file input; actual insertion happens in its
    // change handler, so we return true here just to signal the toolbar
    // that the command "ran".
    imageInput.value = "";
    imageInput.click();
    return true;
  }

  imageInput.addEventListener('change', async () => {
    const file = imageInput.files && imageInput.files[0];
    if (!file) return;
    imageStatus.style.display = '';
    imageStatus.textContent = `Uploading ${file.name}...`;
    try {
      const fd = new FormData();
      fd.append('asset', file);
      const r = await fetch(uploadUrl, { method: 'POST', body: fd });
      const data = await r.json();
      if (!data.ok) {
        imageStatus.textContent = `Upload failed: ${data.error || 'unknown error'}`;
        return;
      }
      const imgNode = schema.nodes.image.create({
        src: data.path,
        alt: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
      });
      const tr = view.state.tr.replaceSelectionWith(imgNode);
      view.dispatch(tr);
      view.focus();
      imageStatus.textContent = `Inserted ${data.filename} (${data.bytes.toLocaleString()} bytes).`;
      setTimeout(() => { imageStatus.style.display = 'none'; }, 4000);
    } catch (e) {
      imageStatus.textContent = `Upload failed: ${e}`;
    }
  });

  const cmds = {
    bold: cmdBold,
    italic: cmdItalic,
    code: cmdCode,
    link: setLink,
    h1: setBlockType(schema.nodes.heading, { level: 1 }),
    h2: setBlockType(schema.nodes.heading, { level: 2 }),
    h3: setBlockType(schema.nodes.heading, { level: 3 }),
    p: setBlockType(schema.nodes.paragraph),
    ul: wrapInList(schema.nodes.bullet_list),
    ol: wrapInList(schema.nodes.ordered_list),
    quote: wrapIn(schema.nodes.blockquote),
    image: insertImage,
    undo: undo,
    redo: redo,
  };

  const state = EditorState.create({
    doc,
    schema,
    plugins: [
      history(),
      keymap({
        "Mod-b": cmdBold,
        "Mod-i": cmdItalic,
        "Mod-`": cmdCode,
        "Mod-z": undo,
        "Mod-y": redo,
        "Shift-Mod-z": redo,
        "Enter": splitListItem(schema.nodes.list_item),
        "Mod-[": liftListItem(schema.nodes.list_item),
        "Mod-]": sinkListItem(schema.nodes.list_item),
      }),
      keymap(baseKeymap),
      dropCursor(),
      gapCursor(),
    ],
  });

  const view = new EditorView(document.getElementById('editor-host'), {
    state,
    dispatchTransaction(tr) {
      const next = view.state.apply(tr);
      view.updateState(next);
      refreshToolbarActive();
    }
  });

  function refreshToolbarActive() {
    document.querySelectorAll('.editor-toolbar button.tb').forEach(btn => {
      const cmd = btn.dataset.cmd;
      let active = false;
      const { schema: s, selection } = view.state;
      if (cmd === 'bold')   active = !!s.marks.strong && view.state.doc.rangeHasMark(selection.from, selection.to, s.marks.strong);
      if (cmd === 'italic') active = !!s.marks.em     && view.state.doc.rangeHasMark(selection.from, selection.to, s.marks.em);
      if (cmd === 'code')   active = !!s.marks.code   && view.state.doc.rangeHasMark(selection.from, selection.to, s.marks.code);
      btn.classList.toggle('active', active);
    });
  }

  document.querySelectorAll('.editor-toolbar button.tb').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const cmd = cmds[btn.dataset.cmd];
      if (!cmd) return;
      cmd(view.state, view.dispatch, view);
      view.focus();
    });
  });

  const saveBtn = document.getElementById('save-btn');
  const saveStatus = document.getElementById('save-status');
  async function save() {
    saveStatus.textContent = 'Saving...';
    saveBtn.disabled = true;
    try {
      const body = defaultMarkdownSerializer.serialize(view.state.doc);
      const r = await fetch(window.location.pathname, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body }),
      });
      const data = await r.json();
      saveStatus.textContent = data.ok ? `Saved (${data.bytes} bytes)` : 'Save failed';
    } catch (e) {
      saveStatus.textContent = 'Save failed: ' + e;
    } finally {
      saveBtn.disabled = false;
    }
  }
  saveBtn.addEventListener('click', save);
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      save();
    }
  });
</script>
{% endblock %}
